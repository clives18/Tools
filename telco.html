<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telco Capex, Payback &amp; IRR Scenario Model</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #F5F2EA; font-family: Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px;
      outline: none; cursor: pointer; background: #D5CFC0;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #85744F; border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(133,116,79,0.45); cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #85744F; border: 2px solid #fff; cursor: pointer;
    }
    input[type=range]::-moz-range-progress { background: #85744F; height: 4px; border-radius: 2px; }

    .reset-btn {
      background: none; border: 1.5px solid #85744F; color: #85744F;
      padding: 7px 18px; border-radius: 6px; cursor: pointer;
      font-family: Helvetica, Arial, sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }
    .reset-btn:hover { background: #85744F; color: #fff; }

    .layout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }
    .card-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .section-divider {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #85744F;
      border-top: 1px solid #F0EDE5; padding-top: 16px; margin-top: 6px; margin-bottom: 14px;
    }

    @media (max-width: 800px) { .layout-grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .card-grid-2 { grid-template-columns: 1fr; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F0EDE5; }
    ::-webkit-scrollbar-thumb { background: #C5BB9F; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const GST_RATE        = 0.10;
    const ARPU_ESCALATION = 0.035;

    // ── IRR ──────────────────────────────────────────────────────────────────
    function calcIRR(flows, guess = 0.1) {
      let rate = guess;
      for (let i = 0; i < 1000; i++) {
        let npv = 0, dnpv = 0;
        for (let t = 0; t < flows.length; t++) {
          const d = Math.pow(1 + rate, t);
          npv  += flows[t] / d;
          dnpv -= (t * flows[t]) / Math.pow(1 + rate, t + 1);
        }
        if (dnpv === 0) return null;
        const next = rate - npv / dnpv;
        if (Math.abs(next - rate) < 1e-7) return next;
        rate = next;
      }
      return null;
    }

    // ── Formatters ───────────────────────────────────────────────────────────
    const fmt = {
      currency:  (n) => (!n || !isFinite(n)) ? '$0' : '$' + Math.round(n).toLocaleString(),
      currency2: (n) => !isFinite(n) ? '$0.00' : '$' + n.toFixed(2),
      pct:       (n) => `${Math.round(n * 100)}%`,
      num:       (n) => Math.round(n).toLocaleString(),
      months:    (n) => (!n || !isFinite(n)) ? '—' : `${n.toFixed(1)} mo`,
      irr:       (n) => (n === null || !isFinite(n)) ? 'N/A' : `${(n * 100).toFixed(1)}%`,
    };

    // ── Slider ───────────────────────────────────────────────────────────────
    function Slider({ label, value, low, high, onChange, display, note }) {
      const pct = high > low ? ((value - low) / (high - low)) * 100 : 0;
      const trackBg = `linear-gradient(to right, #85744F ${pct}%, #D5CFC0 ${pct}%)`;
      return (
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: note ? 2 : 5 }}>
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.07em', color: '#2D2D2D', textTransform: 'uppercase' }}>
              {label}
            </span>
            <span style={{ fontSize: 14, fontWeight: 700, color: '#85744F', minWidth: 60, textAlign: 'right' }}>
              {display(value)}
            </span>
          </div>
          {note && <div style={{ fontSize: 10, color: '#85744F', marginBottom: 5, fontStyle: 'italic', opacity: 0.85 }}>{note}</div>}
          <input type="range" min={low} max={high} step={(high - low) / 400}
            value={value} onChange={(e) => onChange(parseFloat(e.target.value))}
            style={{ background: trackBg }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 3 }}>
            <span style={{ fontSize: 10, color: '#919191' }}>{display(low)}</span>
            <span style={{ fontSize: 10, color: '#919191' }}>{display(high)}</span>
          </div>
        </div>
      );
    }

    // ── Card ─────────────────────────────────────────────────────────────────
    function Card({ label, value, sub, highlight, status }) {
      const valueColor = status === 'approved' ? '#16a34a' : status === 'rejected' ? '#dc2626' : highlight ? '#fff' : '#2D2D2D';
      return (
        <div style={{
          background: highlight ? 'linear-gradient(135deg, #85744F 0%, #6b5c3e 100%)' : '#fff',
          border: highlight ? 'none' : '1px solid #E8E4D9', borderRadius: 12, padding: '18px 20px',
          boxShadow: highlight ? '0 8px 28px rgba(133,116,79,0.28)' : '0 2px 10px rgba(0,0,0,0.05)',
          position: 'relative', overflow: 'hidden',
        }}>
          {highlight && <div style={{ position: 'absolute', top: 0, right: 0, width: 72, height: 72, background: 'rgba(255,255,255,0.07)', borderRadius: '0 12px 0 72px' }} />}
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: highlight ? 'rgba(255,255,255,0.6)' : '#919191', marginBottom: 7 }}>{label}</div>
          <div style={{ fontSize: highlight ? 26 : 22, fontWeight: 700, color: valueColor, letterSpacing: '-0.02em', lineHeight: 1 }}>{value}</div>
          {sub && <div style={{ fontSize: 11, color: highlight ? 'rgba(255,255,255,0.5)' : '#919191', marginTop: 5 }}>{sub}</div>}
        </div>
      );
    }

    function ScenarioTag({ label }) {
      return (
        <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', background: '#DDDABD', color: '#85744F', padding: '4px 12px', borderRadius: 20 }}>
          {label}
        </span>
      );
    }

    // ── IRR Assumptions Panel ─────────────────────────────────────────────────
    function IRRAssumptions({ v, calc }) {
      const rows = [
        ['Revenue basis',         'ARPU ex-GST — 10% GST removed from slider input'],
        ['Year 1 ARPU (ex-GST)',  `${fmt.currency2(calc.arpuExGst)} / subscriber / month`],
        ['ARPU escalation',       `${(ARPU_ESCALATION * 100).toFixed(1)}% per annum applied from Year 2`],
        ['Active subscribers',    fmt.num(calc.activeSubscribers)],
        ['Cost of sale (monthly)',`Backhaul $${v.backhaul}/mo + Internet $${v.costPerSubInternet.toFixed(2)}/sub + Support $${v.costPerSubSupport.toFixed(2)}/sub + RBS $${v.costPerSubRBS.toFixed(2)}/sub`],
        ['Annual cost of sale',   fmt.currency(calc.annualCostOfSale)],
        ['Projection period',     '5 years'],
        ['Year 0 cash flow',      `(${fmt.currency(calc.totalCapex)})  —  total capex outlay`],
        ['Years 1–5 cash flows',  'Annual net revenue (ex cost of sale) with 3.5% p.a. ARPU escalation on revenue only'],
        ['IRR method',            'Newton-Raphson iteration on 6-period discounted cash flow series'],
      ];
      return (
        <div style={{ background: '#FAFAF7', border: '1px solid #E8E4D9', borderRadius: 10, padding: '16px 18px' }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#85744F', marginBottom: 12 }}>
            IRR Assumptions
          </div>
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <tbody>
              {rows.map(([k, val], i) => (
                <tr key={i} style={{ borderBottom: i < rows.length - 1 ? '1px solid #F0EDE5' : 'none' }}>
                  <td style={{ fontSize: 11, color: '#919191', padding: '6px 10px 6px 0', fontWeight: 700, whiteSpace: 'nowrap', verticalAlign: 'top', width: '38%' }}>{k}</td>
                  <td style={{ fontSize: 11, color: '#2D2D2D', padding: '6px 0', verticalAlign: 'top' }}>{val}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ── Defaults ─────────────────────────────────────────────────────────────
    const DEFAULTS = {
      dwellings:            200,
      labourRate:            80,
      installHours:           3,
      endUnitMaterials:     200,
      centralEquipment:    7000,   // $5k–$15k, default $7k
      takeUpRate:          0.75,
      arpu:                  50,   // inc. GST
      // Costs of sale
      backhaul:             600,   // $/month flat, whole operation
      costPerSubInternet:  2.50,   // $/sub/month
      costPerSubSupport:   2.00,   // $/sub/month
      costPerSubRBS:       2.17,   // $/sub/month
    };

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [v, setV] = useState(DEFAULTS);
      const set = (key) => (val) => setV((prev) => ({ ...prev, [key]: val }));

      const calc = useMemo(() => {
        const arpuExGst = v.arpu / (1 + GST_RATE);

        // Capex
        const centralEquipPerUnit = v.dwellings > 0 ? v.centralEquipment / v.dwellings : 0;
        const capexPerUnit        = (v.labourRate * v.installHours) + v.endUnitMaterials + centralEquipPerUnit;
        const totalCapex          = capexPerUnit * v.dwellings;
        const activeSubscribers   = v.dwellings * v.takeUpRate;

        // Monthly cost of sale
        const monthlyCostOfSale = v.backhaul + activeSubscribers * (v.costPerSubInternet + v.costPerSubSupport + v.costPerSubRBS);
        const annualCostOfSale  = monthlyCostOfSale * 12;

        // Monthly net revenue (ex-GST ARPU minus cost of sale)
        const monthlyRevenue    = activeSubscribers * arpuExGst;
        const monthlyNet        = monthlyRevenue - monthlyCostOfSale;

        // Payback: Total Capex ÷ monthly net (Year 1, no escalation)
        const paybackMonths = monthlyNet > 0 ? totalCapex / monthlyNet : 0;
        const approved      = paybackMonths > 0 && paybackMonths <= 30.0;

        // IRR: 5-year cash flows with ARPU escalation on revenue; cost of sale stays flat
        const cashFlows = [-totalCapex];
        for (let t = 1; t <= 5; t++) {
          const escalatedArpu    = arpuExGst * Math.pow(1 + ARPU_ESCALATION, t - 1);
          const annualRevenue    = activeSubscribers * escalatedArpu * 12;
          const annualCos        = annualCostOfSale;   // flat each year
          cashFlows.push(annualRevenue - annualCos);
        }

        let irr = null;
        if (totalCapex > 0 && cashFlows.slice(1).some(cf => cf !== 0)) {
          try { irr = calcIRR(cashFlows); } catch(_) {}
        }

        return { arpuExGst, capexPerUnit, totalCapex, activeSubscribers, monthlyCostOfSale, annualCostOfSale, monthlyNet, paybackMonths, approved, irr };
      }, [v]);

      const scenarioLabel = useMemo(() => {
        const pairs = [
          [v.dwellings, 0, 400], [v.labourRate, 60, 100], [v.installHours, 1, 8],
          [v.endUnitMaterials, 100, 400], [v.centralEquipment, 5000, 15000],
          [v.takeUpRate, 0.60, 0.80], [v.arpu, 40, 80],
          [v.backhaul, 400, 800], [v.costPerSubInternet, 1, 5],
          [v.costPerSubSupport, 1, 4], [v.costPerSubRBS, 1, 4],
        ];
        const avg = pairs.reduce((s, [val, lo, hi]) => s + (val - lo) / (hi - lo), 0) / pairs.length;
        return avg < 0.35 ? 'Low Scenario' : avg > 0.65 ? 'High Scenario' : 'Base Scenario';
      }, [v]);

      return (
        <div style={{ minHeight: '100vh', background: '#F5F2EA', paddingBottom: 60 }}>

          {/* Header */}
          <div style={{ background: '#2D2D2D', padding: '32px 40px 26px', borderBottom: '3px solid #85744F' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto' }}>
              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
                <div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
                    <div style={{ width: 4, height: 30, background: '#85744F', borderRadius: 2, flexShrink: 0 }} />
                    <h1 style={{ fontSize: 24, fontWeight: 700, color: '#F5F2EA', letterSpacing: '0.01em', lineHeight: 1.2 }}>
                      Telco Capex, Payback &amp; IRR<br />Scenario Model
                    </h1>
                  </div>
                  <p style={{ fontSize: 11, color: '#919191', letterSpacing: '0.04em', marginLeft: 16 }}>
                    Interactive model for evaluating telco network deployment economics in MDU projects
                  </p>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 10 }}>

            <div className="layout-grid">

              {/* Left: Inputs */}
              <div style={{ background: '#fff', borderRadius: 14, padding: '28px 28px 16px', border: '1px solid #E8E4D9', boxShadow: '0 2px 14px rgba(0,0,0,0.05)' }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#85744F', marginBottom: 22, paddingBottom: 12, borderBottom: '1px solid #F0EDE5' }}>
                  Scenario Inputs
                </div>

                {/* ── Capex Inputs ── */}
                <div className="section-divider">Capex &amp; Deployment</div>

                <Slider label="Number of Dwellings"
                  value={v.dwellings} low={0} high={400}
                  onChange={set('dwellings')} display={fmt.num} />

                <Slider label="Labour Rate ($/hr)"
                  value={v.labourRate} low={60} high={100}
                  onChange={set('labourRate')} display={(n) => `$${Math.round(n)}`} />

                <Slider label="Install Hours per Unit"
                  value={v.installHours} low={1} high={8}
                  onChange={set('installHours')} display={(n) => `${n.toFixed(1)}h`} />

                <Slider label="End-Unit Materials ($)"
                  value={v.endUnitMaterials} low={100} high={400}
                  onChange={set('endUnitMaterials')} display={(n) => `$${Math.round(n)}`} />

                <Slider label="Central Equipment ($)"
                  value={v.centralEquipment} low={5000} high={15000}
                  onChange={set('centralEquipment')} display={(n) => `$${Math.round(n/1000).toFixed(0)}k`} />

                <Slider label="Take-up Rate"
                  value={v.takeUpRate} low={0.60} high={0.80}
                  onChange={set('takeUpRate')} display={(n) => `${Math.round(n*100)}%`} />

                {/* ── Revenue Inputs ── */}
                <div className="section-divider">Revenue</div>

                <Slider label="ARPU ($/month inc. GST)"
                  value={v.arpu} low={40} high={80}
                  onChange={set('arpu')} display={(n) => `$${Math.round(n)}`}
                  note={`Ex-GST: ${fmt.currency2(v.arpu / 1.10)}/mo — used in all calculations`} />

                {/* ── Costs of Sale ── */}
                <div className="section-divider">Costs of Sale</div>

                <Slider label="Backhaul ($/month, whole operation)"
                  value={v.backhaul} low={400} high={800}
                  onChange={set('backhaul')} display={(n) => `$${Math.round(n)}`} />

                <Slider label="Internet Cost ($/sub/month)"
                  value={v.costPerSubInternet} low={1} high={5}
                  onChange={set('costPerSubInternet')} display={(n) => `$${n.toFixed(2)}`} />

                <Slider label="Support Cost ($/sub/month)"
                  value={v.costPerSubSupport} low={1} high={4}
                  onChange={set('costPerSubSupport')} display={(n) => `$${n.toFixed(2)}`} />

                <Slider label="RBS Levy ($/sub/month)"
                  value={v.costPerSubRBS} low={1} high={4}
                  onChange={set('costPerSubRBS')} display={(n) => `$${n.toFixed(2)}`} />
              </div>

              {/* Right: Outputs */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', textTransform: 'uppercase', color: '#85744F' }}>
                  Scenario Outputs
                </div>

                {/* Capex row */}
                <div className="card-grid-2">
                  <Card label="Capex per Unit" value={fmt.currency(calc.capexPerUnit)} sub="Labour + materials + central equip" highlight />
                  <Card label="Total Capex"    value={fmt.currency(calc.totalCapex)}   sub="Deployed across all dwellings" />
                </div>

                {/* Monthly economics row */}
                <div className="card-grid-2">
                  <Card label="Monthly Revenue ex-GST" value={fmt.currency(calc.activeSubscribers > 0 ? calc.activeSubscribers * calc.arpuExGst : 0)} sub="Active subs × ARPU ex-GST" />
                  <Card label="Monthly Cost of Sale"   value={fmt.currency(calc.monthlyCostOfSale)} sub="Backhaul + per-sub costs" />
                </div>

                {/* Payback row */}
                <div className="card-grid-2">
                  <Card label="Payback Period"
                    value={fmt.months(calc.paybackMonths)}
                    sub="Total capex ÷ monthly net revenue" />
                  <Card label="Payback Status"
                    value={calc.paybackMonths === 0 ? '—' : calc.approved ? 'Approved' : 'Not Approved'}
                    status={calc.paybackMonths === 0 ? null : calc.approved ? 'approved' : 'rejected'}
                    sub={calc.paybackMonths === 0 ? '' : calc.approved ? '≤ 30 months' : '> 30 months'} />
                </div>

                {/* IRR row */}
                <div className="card-grid-2">
                  <Card label="5-Year Project IRR" value={fmt.irr(calc.irr)} sub="Ex-GST, 3.5% p.a. ARPU escalation" />
                  <Card label="Monthly Net Revenue" value={fmt.currency(calc.monthlyNet)} sub="After all costs of sale" />
                </div>

                {/* IRR Assumptions */}
                <IRRAssumptions v={v} calc={calc} />

                {/* Model Notes */}
                <div style={{ background: '#FAFAF7', border: '1px solid #E8E4D9', borderRadius: 10, padding: '16px 18px' }}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#919191', marginBottom: 8 }}>
                    Model Notes
                  </div>
                  {[
                    'Capex per unit = (Labour Rate × Install Hours) + End-Unit Materials + (Central Equipment ÷ Dwellings).',
                    'Total capex is deployed across all dwellings regardless of take-up rate.',
                    'ARPU is entered inclusive of GST. All revenue calculations use ex-GST ARPU (ARPU ÷ 1.10).',
                    'Active Subscribers = Dwellings × Take-up Rate.',
                    'Costs of Sale (monthly): Backhaul is a flat monthly fee for the whole operation. Internet, Support and RBS Levy are per active subscriber per month.',
                    'Monthly Cost of Sale = Backhaul + (Active Subs × (Internet + Support + RBS Levy)).',
                    'Payback Period = Total Capex ÷ Monthly Net Revenue, where Monthly Net Revenue = (Active Subs × ARPU ex-GST) − Monthly Cost of Sale.',
                    'IRR cash flows: Year 0 = −Total Capex. Years 1–5 = Annual Revenue ex-GST (escalated 3.5% p.a. from Year 2) minus Annual Cost of Sale (flat).',
                    'IRR is a 5-year discounted cash flow return estimate solved via Newton-Raphson iteration.',
                  ].map((note, i) => (
                    <div key={i} style={{ fontSize: 11, color: '#919191', lineHeight: 1.65, display: 'flex', gap: 7, marginBottom: 2 }}>
                      <span style={{ color: '#C5BB9F', flexShrink: 0 }}>—</span>
                      <span>{note}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
